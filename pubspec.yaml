name: ar_demo
description: "A new Flutter project."

publish_to: "none"

version: 0.1.0

environment:
  sdk: '>=3.2.5 <4.0.0'

# ------------------------------------------------------------------
# Dependencies
# ------------------------------------------------------------------
dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ----------------------------------------------------------------
  # State Management & Architecture
  # ----------------------------------------------------------------
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  provider: ^6.1.5+1
  get_it: ^8.2.0
  dartz: ^0.10.1
  collection: ^1.19.1
  go_router: ^16.2.4

  # ----------------------------------------------------------------
  # Networking & Data
  # ----------------------------------------------------------------
  dio: ^5.9.0
  http: ^1.5.0
  http_parser: ^4.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  image: ^4.5.4
  # ----------------------------------------------------------------
  # UI / UX
  # ----------------------------------------------------------------
  google_fonts: ^6.3.3
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.1
  flutter_spinkit: ^5.2.2
  shimmer: ^3.0.0
  lottie: ^3.3.2
  flutter_native_splash: ^2.4.7
  intl: 0.20.2

  permission_handler: ^12.0.1

  camerawesome: ^2.5.0

  # ----------------------------------------------------------------
  # Augmented Reality
  # ----------------------------------------------------------------
  ar_flutter_plugin: ^0.7.3
  vector_math: ^2.1.0


# ------------------------------------------------------------------
# Dev Dependencies
# ------------------------------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  i18n_json: ^1.0.0
  flutter_i18n_translator:
    git:
      url: https://github.com/MazenxELGayar/flutter_i18n_translator
  asset_to_dart:
    git:
      url: https://github.com/MazenxELGayar/asset_to_dart
  translator: ^1.0.4+1
# ------------------------------------------------------------------
# Dependency Overrides
# ------------------------------------------------------------------
dependency_overrides:
  intl: 0.20.2
  just_audio: ^0.10.5
  permission_handler: ^12.0.1

# ------------------------------------------------------------------
# Flutter Assets
# ------------------------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/
    - assets/lotties/
    - assets/glbs/
